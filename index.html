<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃啥？🎰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
        }
        
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #333;
            position: relative;
            transition: transform 3s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            overflow: hidden;
        }
        
        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.1);
        }
        
        .wheel-segment span {
            position: absolute;
            left: 60%;
            top: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            white-space: nowrap;
        }
        
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4757;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            border: 4px solid #333;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 15px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .result {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .result-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .result-name {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }
        
        .result-score {
            color: #ff9f43;
            font-weight: bold;
        }
        
        .history {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #ddd;
        }
        
        .history-title {
            font-size: 14px;
            color: #999;
            margin-bottom: 10px;
        }
        
        .history-item {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #666;
            transition: all 0.3s;
        }
        
        .step.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .step.completed {
            background: #2ed573;
            color: white;
        }
        
        .info {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

        const colors = [

            '#54a0ff', '#5f27cd', '#00d2d3', '#1dd1a1'
        ];

        function initWheel(items) {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            const segmentAngle = 360 / items.length;
            
            items.forEach((item, index) => {
                const segment = document.createElement('div');
                segment.className = 'wheel-segment';
                const rotation = index * segmentAngle - 45;
                segment.style.transform = `rotate(${rotation}deg)`;
                segment.style.background = colors[index % colors.length];
                
                const span = document.createElement('span');
                span.textContent = item.name || item;
                segment.appendChild(span);
                
                wheel.appendChild(segment);
            });
        }

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            
            const wheel = document.getElementById('wheel');
            const spinBtn = document.getElementById('spinBtn');
            spinBtn.disabled = true;
            
            // 计算旋转角度
            const extraSpins = 5 + Math.random() * 5;
            const randomAngle = Math.random() * 360;
            const totalRotation = extraSpins * 360 + randomAngle;
            
            wheel.style.transform = `rotate(${totalRotation}deg)`;
            
            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;
                
                // 计算选中的项目
                const normalizedAngle = totalRotation % 360;
                const items = currentStep === 1 ? Object.keys(restaurantData) : getAvailableRestaurants(selectedCategory);
                const segmentAngle = 360 / items.length;
                // 指针在顶部，需要调整计算
                const selectedIndex = Math.floor(((360 - normalizedAngle + 90) % 360) / segmentAngle) % items.length;
                
                if (currentStep === 1) {
                    selectedCategory = items[selectedIndex];
                    showResult('category', selectedCategory);
                    currentStep = 2;
                    updateStepIndicator();
                    initWheel(getAvailableRestaurants(selectedCategory));
                    spinBtn.textContent = '选择餐厅';
                } else {
                    const restaurant = items[selectedIndex];
                    showResult('restaurant', restaurant);
                    addToHistory(restaurant, selectedCategory);
                    spinBtn.textContent = '再来一次';
                }
            }, 3000);
        }

        function getAvailableRestaurants(category) {
            const allRestaurants = restaurantData[category];
            const lastThreeNames = history.slice(-3).map(h => h.name);
            return allRestaurants.filter(r => !lastThreeNames.includes(r.name));
        }

        function showResult(type, item) {
            const result = document.getElementById('result');
            const resultTitle = document.getElementById('resultTitle');
            const resultName = document.getElementById('resultName');
            const resultScore = document.getElementById('resultScore');
            const resultEmoji = document.getElementById('resultEmoji');
            const centerEmoji = document.getElementById('centerEmoji');
            
            result.classList.add('show');
            
            if (type === 'category') {
                resultTitle.textContent = '🎯 选中分类';
                resultName.textContent = item;
                resultScore.textContent = '';
                resultEmoji.textContent = '📁';
                centerEmoji.textContent = '🍽️';
            } else {
                resultTitle.textContent = '🎉 今天吃这个！';
                resultName.textContent = item.name;
                resultScore.textContent = `⭐ ${item.score}分 ${item.emoji}`;
                resultEmoji.textContent = '🎊';
                centerEmoji.textContent = item.emoji;
            }
        }

        function addToHistory(restaurant, category) {
            history.push({ name: restaurant.name, category: category, score: restaurant.score });
            if (history.length > 3) {
                history.shift();
            }
            updateHistory();
        }

        function updateHistory() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = history.map((h, i) => 
                `<div class="history-item">${i + 1}. ${h.category} · ${h.name} ⭐${h.score}</div>`
            ).join('');
        }

        function updateStepIndicator() {
            document.getElementById('step1').className = currentStep >= 1 ? 'step completed' : 'step';
            document.getElementById('step2').className = currentStep >= 2 ? 'step active' : 'step';
        }

        function resetSelection() {
            currentStep = 1;
            selectedCategory = null;
            updateStepIndicator();
            initWheel(Object.keys(restaurantData));
            document.getElementById('result').classList.remove('show');
            document.getElementById('spinBtn').textContent = '开始选择';
            document.getElementById('centerEmoji').textContent = '🍽️';
        }

        // 初始化
        initWheel(Object.keys(restaurantData));
    </script>
</body>
</html>
