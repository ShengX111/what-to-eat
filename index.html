        * {

            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        
        /* 赛博朋克背景动画 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent 0px,
                    transparent 2px,
                    rgba(0, 255, 255, 0.03) 2px,
                    rgba(0, 255, 255, 0.03) 4px
                );
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            background: rgba(15, 12, 41, 0.9);
            border: 2px solid #00ffff;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.5),
                0 0 40px rgba(255, 0, 255, 0.3),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }
        
        /* 霓虹灯效果标题 */
        h1 {
            text-align: center;
            color: #00ffff;
            margin-bottom: 10px;
            font-size: 36px;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff,
                0 0 80px #00ffff;
            animation: flicker 2s infinite;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
            52% { opacity: 1; }
            54% { opacity: 0.9; }
        }
        
        .subtitle {
            text-align: center;
            color: #ff00ff;
            margin-bottom: 30px;
            font-size: 14px;
            text-shadow: 0 0 10px #ff00ff;
        }
        
        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 30px;
        }
        
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #00ffff;
            position: relative;
            transition: transform 3s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            overflow: hidden;
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.5),
                inset 0 0 20px rgba(0, 255, 255, 0.2);
        }
        
        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        
        .wheel-segment span {
            position: absolute;
            left: 55%;
            top: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            font-size: 11px;
            font-weight: bold;
            color: white;
            text-shadow: 
                0 0 5px currentColor,
                0 0 10px currentColor;
            white-space: nowrap;
            width: 80px;
            text-align: center;
        }
        
        .wheel-segment i {
            position: absolute;
            left: 70%;
            top: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            font-size: 18px;
            color: white;
            text-shadow: 0 0 10px currentColor;
        }
        
        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff0066;
            z-index: 10;
            filter: drop-shadow(0 0 10px #ff0066);
        }
        
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 100%);
            border-radius: 50%;
            border: 3px solid #00ffff;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 18px 30px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #00ffff 0%, #ff00ff 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 10px 30px rgba(0, 255, 255, 0.5),
                0 0 60px rgba(255, 0, 255, 0.3);
        }
        
        .btn:active {
            transform: translateY(-1px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #ff0066 0%, #ff00ff 100%);
        }
        
        .result {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            text-align: center;
            display: none;
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.3),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
        }
        
        .result.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-emoji {
            font-size: 60px;
            margin-bottom: 10px;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .result-title {
            font-size: 16px;
            color: #00ffff;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #00ffff;
        }
        
        .result-category {
            font-size: 14px;
            color: #ff00ff;

            text-shadow: 0 0 10px #00ff00;

        .history {

            text-shadow: 0 0 5px #00ffff;

            background: rgba(0, 255, 255, 0.1);

            margin-bottom: 8px;

        .info {

        /* 音乐控制 */

            top: 15px;
            right: 15px;

            color: #00ffff;

        .decoration.bottom-left { bottom: -5px; left: -5px; }
        .decoration.bottom-right { bottom: -5px; right: -5px; }
    </style>
</head>

        const colors = restaurantData.map(c => c.color);

        function initWheel() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            const segmentAngle = 360 / restaurantData.length;
            
            restaurantData.forEach((item, index) => {
                const segment = document.createElement('div');
                segment.className = 'wheel-segment';
                const rotation = index * segmentAngle - 45;
                segment.style.transform = `rotate(${rotation}deg)`;
                segment.style.background = `linear-gradient(135deg, ${item.color} 0%, ${item.color}cc 100%)`;
                
                const icon = document.createElement('i');
                icon.className = `fas ${item.icon}`;
                segment.appendChild(icon);
                
                const span = document.createElement('span');
                span.textContent = item.category;
                span.style.color = item.color;
                segment.appendChild(span);
                
                wheel.appendChild(segment);
            });
        }

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            
            const wheel = document.getElementById('wheel');
            const spinBtn = document.getElementById('spinBtn');
            const resetBtn = document.getElementById('resetBtn');
            spinBtn.disabled = true;
            
            // 播放音乐
            if (!isMusicPlaying) {
                toggleMusic();
            }
            
            // 计算旋转角度
            const extraSpins = 5 + Math.random() * 5;
            const randomAngle = Math.random() * 360;
            const totalRotation = extraSpins * 360 + randomAngle;
            
            wheel.style.transform = `rotate(${totalRotation}deg)`;
            
            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;
                
                // 计算选中的分类
                const normalizedAngle = totalRotation % 360;
                const segmentAngle = 360 / restaurantData.length;
                const selectedIndex = Math.floor(((360 - normalizedAngle + 90) % 360) / segmentAngle) % restaurantData.length;
                
                const selectedCategory = restaurantData[selectedIndex];
                const availableRestaurants = getAvailableRestaurants(selectedCategory.restaurants);
                const randomRestaurant = availableRestaurants[Math.floor(Math.random() * availableRestaurants.length)];
                
                showResult(selectedCategory, randomRestaurant);
                addToHistory(randomRestaurant, selectedCategory.category);
                
                spinBtn.style.display = 'none';
                resetBtn.style.display = 'block';
            }, 3000);
        }

        function getAvailableRestaurants(restaurants) {
            const lastThreeNames = history.slice(-3).map(h => h.name);
            const available = restaurants.filter(r => !lastThreeNames.includes(r.name));
            return available.length > 0 ? available : restaurants;
        }

        function getIconEmoji(iconName) {
            const iconMap = {
                'fa-pepper-hot': '🌶️',
                'fa-bowl-rice': '🍚',
                'fa-fish': '🐟',
                'fa-fire': '🔥',
                'fa-drumstick-bite': '🍗',
                'fa-burger': '🍔',
                'fa-pizza-slice': '🍕',
                'fa-leaf': '🥗'
            };
            return iconMap[iconName] || '🍽️';
        }

        function showResult(category, restaurant) {
            const result = document.getElementById('result');
            const resultTitle = document.getElementById('resultTitle');
            const resultCategory = document.getElementById('resultCategory');
            const resultName = document.getElementById('resultName');
            const resultScore = document.getElementById('resultScore');
            const resultEmoji = document.getElementById('resultEmoji');
            const centerEmoji = document.getElementById('centerEmoji');
            
            result.classList.add('show');
            
            resultTitle.textContent = '🎉 今天吃这个！';
            resultCategory.textContent = `${getIconEmoji(category.icon)} ${category.category}`;
            resultCategory.style.color = category.color;
            resultName.textContent = restaurant.name;
            resultScore.textContent = `⭐ ${restaurant.score}分`;
            resultEmoji.textContent = '🍽️';
            centerEmoji.textContent = '🎊';
        }

        function addToHistory(restaurant, category) {
            history.push({ name: restaurant.name, category: category });
            if (history.length > 3) {
                history.shift();
            }
            updateHistory();
        }

        function updateHistory() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = history.map((h, i) => 
                `<div class="history-item">${i + 1}. 🍴 ${h.category} · ${h.name}</div>`
            ).join('');
        }

        function resetSelection() {
            const wheel = document.getElementById('wheel');
            wheel.style.transform = 'rotate(0deg)';
            
            document.getElementById('result').classList.remove('show');
            document.getElementById('spinBtn').style.display = 'block';
            document.getElementById('resetBtn').style.display = 'none';
            document.getElementById('centerEmoji').textContent = '🎲';
        }

        function toggleMusic() {
            const music = document.getElementById('bgMusic');
            const musicBtn = document.getElementById('musicBtn');
            
            if (isMusicPlaying) {
                music.pause();
                musicBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
                musicBtn.classList.add('muted');
            } else {
                music.volume = 0.3;
                music.play().catch(e => console.log('Music autoplay blocked'));
                musicBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
                musicBtn.classList.remove('muted');
            }
            isMusicPlaying = !isMusicPlaying;
        }

        // 初始化
        initWheel();
    </script>
</body>
</html>
