<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吃了么？🎰</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 25px;
        }
        
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #333;
            position: relative;
            transition: transform 3s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            overflow: hidden;
            background: #fff;
        }
        
        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
        }
        
        .wheel-segment i {
            position: absolute;
            left: 65%;
            top: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            font-size: 20px;
            color: #333;
        }
        
        .wheel-segment span {
            position: absolute;
            left: 55%;
            top: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            font-size: 12px;
            font-weight: bold;
            color: #333;
            white-space: nowrap;
            width: 70px;
            text-align: center;
        }
        
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4757;
            z-index: 10;
        }
        
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: #fff;
            border-radius: 50%;
            border: 3px solid #333;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 16px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
        }
        
        .result {
            background: #f8f9fa;
            border: 2px solid #667eea;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-emoji {
            font-size: 50px;
            margin-bottom: 10px;
        }
        
        .result-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .result-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        
        .history {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #ddd;
        }
        
        .history-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .history-item {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
            border-left: 3px solid #667eea;
        }
        
        .info {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>吃了么？</h1>
        <p class="subtitle">中关村国际孵化园附近 · 评分 4.5+ 精选</p>
        
        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheel"></div>
            <div class="center-circle" id="centerEmoji">🍽️</div>
        </div>
        
        <button class="btn" id="spinBtn" onclick="spinWheel()">
            <i class="fas fa-play"></i> 开始选择
        </button>
        <button class="btn btn-secondary" id="resetBtn" onclick="resetWheel()" style="display: none;">
            <i class="fas fa-redo"></i> 再选一次
        </button>
        
        <div class="result" id="result">
            <div class="result-emoji" id="resultEmoji">🎉</div>
            <div class="result-title">今天吃</div>
            <div class="result-name" id="resultName"></div>
        </div>
        
        <div class="history" id="history">
            <div class="history-title"><i class="fas fa-history"></i> 最近选择</div>
            <div id="historyList"></div>
        </div>
        
        <p class="info">💡 最近 3 次选择的分类不会重复出现</p>
    </div>

    <script>
        // 餐厅分类数据 - 8 大分类
        const categories = [
            { category: "川菜", icon: "fa-pepper-hot", emoji: "🌶️" },
            { category: "湘菜", icon: "fa-bowl-rice", emoji: "🍚" },
            { category: "日料", icon: "fa-fish", emoji: "🍣" },
            { category: "火锅", icon: "fa-fire", emoji: "🍲" },
            { category: "烧烤", icon: "fa-drumstick-bite", emoji: "🍢" },
            { category: "快餐", icon: "fa-burger", emoji: "🍔" },
            { category: "西餐", icon: "fa-pizza-slice", emoji: "🍕" },
            { category: "东南亚", icon: "fa-leaf", emoji: "🥥" }
        ];

        let history = [];
        let isSpinning = false;
        let currentRotation = 0;

        function initWheel() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            const segmentAngle = 360 / categories.length;
            
            categories.forEach((item, index) => {
                const segment = document.createElement('div');
                segment.className = 'wheel-segment';
                const rotation = index * segmentAngle - 45;
                segment.style.transform = `rotate(${rotation}deg)`;
                segment.style.background = '#ffffff';
                
                const icon = document.createElement('i');
                icon.className = `fas ${item.icon}`;
                segment.appendChild(icon);
                
                const span = document.createElement('span');
                span.textContent = item.category;
                segment.appendChild(span);
                
                wheel.appendChild(segment);
            });
        }

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            
            const wheel = document.getElementById('wheel');
            const spinBtn = document.getElementById('spinBtn');
            const resetBtn = document.getElementById('resetBtn');
            const centerEmoji = document.getElementById('centerEmoji');
            const result = document.getElementById('result');
            
            spinBtn.disabled = true;
            result.classList.remove('show');
            
            // 重置转盘
            wheel.style.transition = 'none';
            wheel.style.transform = 'rotate(0deg)';
            
            setTimeout(() => {
                wheel.style.transition = 'transform 3s cubic-bezier(0.17, 0.67, 0.83, 0.67)';
                
                // 计算旋转角度
                const extraSpins = 5 + Math.random() * 5;
                const randomAngle = Math.random() * 360;
                currentRotation = extraSpins * 360 + randomAngle;
                
                wheel.style.transform = `rotate(${currentRotation}deg)`;
                centerEmoji.textContent = '🎲';
            }, 50);
            
            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;
                
                // 计算选中的分类
                const normalizedAngle = currentRotation % 360;
                const segmentAngle = 360 / categories.length;
                const selectedIndex = Math.floor(((360 - normalizedAngle + 90) % 360) / segmentAngle) % categories.length;
                
                const selectedCategory = categories[selectedIndex];
                showResult(selectedCategory);
                addToHistory(selectedCategory);
                
                spinBtn.style.display = 'none';
                resetBtn.style.display = 'block';
                centerEmoji.textContent = '🎉';
            }, 3000);
        }

        function resetWheel() {
            const spinBtn = document.getElementById('spinBtn');
            const resetBtn = document.getElementById('resetBtn');
            const result = document.getElementById('result');
            const centerEmoji = document.getElementById('centerEmoji');
            
            result.classList.remove('show');
            spinBtn.style.display = 'block';
            resetBtn.style.display = 'none';
            centerEmoji.textContent = '🍽️';
        }

        function getAvailableCategories() {
            const lastThree = history.slice(-3).map(h => h.category);
            const available = categories.filter(c => !lastThree.includes(c.category));
            return available.length > 0 ? available : categories;
        }

        function showResult(category) {
            const result = document.getElementById('result');
            const resultName = document.getElementById('resultName');
            const resultEmoji = document.getElementById('resultEmoji');
            
            resultName.textContent = `${category.emoji} ${category.category}`;
            resultEmoji.textContent = '🎉';
            result.classList.add('show');
        }

        function addToHistory(category) {
            history.push({ category: category.category, emoji: category.emoji });
            if (history.length > 3) {
                history.shift();
            }
            updateHistory();
        }

        function updateHistory() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = history.map((h, i) => 
                `<div class="history-item">${i + 1}. ${h.emoji} ${h.category}</div>`
            ).join('');
        }

        // 初始化
        initWheel();
    </script>
</body>
</html>
